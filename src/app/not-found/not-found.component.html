<ion-content class="ion-padding not-found">
  <div class="container">
    <div class="animated-bg">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="code-container">
        <span class="digit">4</span>
        <div class="zero-container">
          <div class="zero-ring"></div>
          <span class="digit zero">0</span>
        </div>
        <span class="digit">4</span>
      </div>

      <h2>Oops! Trang không tồn tại</h2>

      <p>Có vẻ như bạn đã đi lạc vào vùng đất chưa được khám phá.<br>
        Đừng lo lắng, hãy quay trở lại hành trình chính nhé!</p>

      <ion-button routerLink="/home" class="home-button" shape="round">
        <ion-icon slot="start" name="home-outline"></ion-icon>
        Về trang chủ
      </ion-button>

      <div class="help-text">
        <ion-icon name="help-circle-outline"></ion-icon>
        <span>Hoặc liên hệ hỗ trợ nếu bạn cần giúp đỡ</span>
      </div>
    </div>
  </div>
</ion-content>
