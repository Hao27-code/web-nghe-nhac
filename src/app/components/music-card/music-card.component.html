<div class="music-card"
     (mouseenter)="isHovered = true"
     (mouseleave)="isHovered = false"
     (click)="onCardClick($event)">

  <div class="image-container">
    <img [src]="music.coverUrl" [alt]="music.title" class="cover-image">

    <button class="play-button" [class.visible]="isHovered || (isCurrentMusic && isPlaying)" (click)="onPlayClick($event)">
      <img [src]="(isCurrentMusic && isPlaying) ? 'assets/icon/pause.svg' : 'assets/icon/play.svg'"
           alt="Play/Pause"
           class="play-icon">
    </button>

    <div class="resume-badge" *ngIf="resumeTime > 0 && !isPlaying">
      {{ formatTime(resumeTime) }}
    </div>
  </div>

  <div class="music-info">
    <div class="title">{{ music.title }}</div>
    <div class="artist">{{ music.artist }}</div>
  </div>
</div>
