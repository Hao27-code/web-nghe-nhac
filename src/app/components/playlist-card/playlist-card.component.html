<div class="playlist-card" (click)="onCardClick($event)">
  <div class="card-image" [class.is-playing]="isCurrentPlaylist && isPlaying">
    <img [src]="playlist.imageUrl" [alt]="playlist.title">

    <!-- Overlay và nút play/pause dùng img -->
    <div class="play-overlay">
      <button class="play-btn" (click)="onPlayClick($event)">
        <img [src]="(isCurrentPlaylist && isPlaying) ? 'assets/icon/pause.svg' : 'assets/icon/play.svg'"
             alt="Play/Pause"
             class="play-icon">
      </button>
    </div>

    <!-- Indicator đang phát -->
    <div class="playing-indicator" *ngIf="isCurrentPlaylist && isPlaying">
      <ion-icon name="volume-high"></ion-icon>
      <span class="playing-wave">
        <span></span><span></span><span></span>
      </span>
    </div>
  </div>
  <div class="card-content">
    <h3 class="playlist-title">
      {{ playlist.title }}

    </h3>
    <p class="playlist-artists">{{ playlist.artists }}</p>
  </div>
</div>
