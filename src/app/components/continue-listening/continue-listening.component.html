<div class="continue-listening">
  <div class="section-header">
    <h2>Tiếp tục nghe</h2>
    <span class="see-all">Tất cả</span>
  </div>

  <div class="card-list">
    <div *ngFor="let track of tracks" class="track-card"
         (click)="playTrack(track)">

      <!-- Ảnh bìa -->
      <div class="card-image" [style.backgroundColor]="track.coverColor">
        <img *ngIf="track.coverImage" [src]="track.coverImage" alt="cover">
        <div class="play-overlay"
             (mouseenter)="hoveredTrack = track.id"
             (mouseleave)="hoveredTrack = null">
          <img src="assets/icons/play-circle.svg" class="play-icon" *ngIf="hoveredTrack === track.id">
        </div>
      </div>

      <!-- Thông tin - không có duration -->
      <div class="track-info">
        <div class="track-title">{{ track.title }}</div>
        <div class="track-artist">{{ track.artist }}</div>
      </div>

      <!-- Thanh phát luôn hiển thị trên mọi card -->
      <div class="card-player">
        <div class="progress-bar-container">
          <div class="progress-bar-fill" [style.width.%]="getProgressPercent(track)"></div>
        </div>
        <div class="player-time-info">
          <span class="player-current-time">{{ formatTime(track.currentTime || 0) }}</span>
          <span class="player-total-time">{{ track.duration }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Mini Player -->
<div class="mini-player" *ngIf="currentTrack">
  <div class="player-container">
    <div class="player-image" [style.backgroundColor]="currentTrack.coverColor">
      <img *ngIf="currentTrack.coverImage" [src]="currentTrack.coverImage">
      <img src="assets/icons/musical-note.svg" *ngIf="!currentTrack.coverImage" class="music-icon">
    </div>

    <div class="player-info">
      <div class="player-title">{{ currentTrack.title }}</div>
      <div class="player-artist">{{ currentTrack.artist }}</div>
    </div>

    <div class="player-actions">
      <img src="assets/icons/heart-outline.svg" class="action-icon like-btn" [class.liked]="currentTrack.liked"
           (click)="toggleLike()">
      <img src="assets/icons/skip-back.svg" class="action-icon" (click)="previousTrack()">
      <img [src]="isPlaying ? 'assets/icons/pause.svg' : 'assets/icons/play.svg'"
           class="action-icon play-btn" (click)="togglePlayPause()">
      <img src="assets/icons/skip-forward.svg" class="action-icon" (click)="nextTrack()">
    </div>
  </div>

  <div class="player-progress">
    <span class="time-current">{{ formatTime(currentTime) }}</span>
    <div class="progress-wrapper">
      <input type="range"
             [value]="currentTime"
             [max]="duration"
             (input)="onSeek($event)"
             (change)="onSeekChange($event)"
             class="progress-slider">
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="(currentTime / duration) * 100"></div>
      </div>
    </div>
    <span class="time-total">{{ formatTime(duration) }}</span>
  </div>
</div>
