<!-- player-bar.component.html - Thay input range bằng div tùy chỉnh -->
<div class="player-bar" *ngIf="currentMusic">
  <div class="player-content">

    <!-- LEFT SECTION -->
    <div class="left-section">
      <img [src]="currentMusic.coverUrl" [alt]="currentMusic.title" class="thumbnail">
      <div class="song-info">
        <div class="song-title">{{ currentMusic.title }}</div>
        <div class="song-artist">{{ currentMusic.artist }}</div>
      </div>
      <button class="like-btn" (click)="onToggleFavorite()">
        <ion-icon [name]="isFavorite() ? 'heart' : 'heart-outline'"></ion-icon>
      </button>
      <button class="menu-btn">
        <ion-icon name="ellipsis-horizontal"></ion-icon>
      </button>
    </div>

    <!-- CENTER SECTION -->
    <div class="center-section">
      <div class="controls">
        <button class="control-btn" (click)="onShuffle()">
          <ion-icon name="shuffle"></ion-icon>
        </button>
        <button class="control-btn" (click)="onPrevious()">
          <ion-icon name="play-skip-back"></ion-icon>
        </button>
        <button class="control-btn play-btn" (click)="onPlayPause()">
          <ion-icon [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
        </button>
        <button class="control-btn" (click)="onNext()">
          <ion-icon name="play-skip-forward"></ion-icon>
        </button>
        <button class="control-btn" (click)="onRepeat()">
          <ion-icon name="repeat"></ion-icon>
        </button>
      </div>

      <div class="progress-container">
        <span class="time">{{ formatTime(currentTime) }}</span>

        <!-- THANH PROGRESS TÙY CHỈNH -->
        <div class="custom-progress" (click)="onSeekProgress($event)">
          <div class="progress-bg">
            <div class="progress-fill" [style.width.%]="getProgressPercent()"></div>
            <div class="progress-thumb" [style.left.%]="getProgressPercent()"></div>
          </div>
        </div>

        <span class="time">{{ formatTime(duration) }}</span>
      </div>
    </div>

    <!-- RIGHT SECTION -->
    <div class="right-section">
      <div class="volume-control">
        <button class="volume-btn" (click)="toggleMute()">
          <ion-icon [name]="getVolumeIcon()"></ion-icon>
        </button>

        <!-- THANH ÂM LƯỢNG TÙY CHỈNH -->
        <div class="custom-volume" (click)="onSeekVolume($event)">
          <div class="volume-bg">
            <div class="volume-fill" [style.width.%]="volume"></div>
            <div class="volume-thumb" [style.left.%]="volume"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
