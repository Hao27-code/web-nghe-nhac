<div class="song-card" (click)="onCardClick($event)">

  <div class="song-image-wrapper">
    <img [src]="song.coverUrl" [alt]="song.title" class="song-image">

    <div class="image-overlay">
      <div class="play-btn" (click)="handlePlayClick($event)">
        <ion-icon [name]="isCurrentSong && isPlaying ? 'pause-circle' : 'play-circle'"></ion-icon>
      </div>
    </div>

    <div class="playing-indicator" *ngIf="isCurrentSong && isPlaying">
      <ion-icon name="volume-high"></ion-icon>
      <span class="playing-wave">
        <span></span><span></span><span></span>
      </span>
    </div>
  </div>

  <div class="song-info">
    <div class="song-text">
      <h3 class="song-title">
        {{ song.title }}
        <span class="playing-text" *ngIf="isCurrentSong && isPlaying">● Đang phát</span>
      </h3>
      <p class="song-artist">{{ song.artist }}</p>
    </div>

    <div class="song-actions">
      <div class="action-btn" (click)="toggleLike($event)">
        <ion-icon [name]="isLiked ? 'heart' : 'heart-outline'"></ion-icon>
      </div>
      <div class="action-btn" (click)="showOptions($event)">
        <ion-icon name="ellipsis-horizontal"></ion-icon>
      </div>
    </div>
  </div>
</div>
