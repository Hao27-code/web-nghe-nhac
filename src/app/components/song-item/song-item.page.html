

<div class="song-card">

  <div class="song-image-wrapper">
    <!-- Ảnh bìa -->
    <img [src]="song.coverUrl" [alt]="song.title" class="song-image">

    <!-- Lớp phủ hiện nút Play/Pause khi hover -->
    <div class="image-overlay">
      <ion-button fill="clear" class="play-btn" (click)="handlePlayClick($event)">
        <ion-icon
          [name]="isCurrentSong && isPlaying ? 'pause-circle' : 'play-circle'"
          slot="icon-only">
        </ion-icon>
      </ion-button>
    </div>

    <!-- Hiển thị indicator đang phát (góc trên phải) -->
    <div class="playing-indicator" *ngIf="isCurrentSong && isPlaying">
      <ion-icon name="volume-high"></ion-icon>
      <span class="playing-wave">
        <span></span><span></span><span></span>
      </span>
    </div>
  </div>

  <div class="song-info">
    <div class="song-text">
      <h3 class="song-title">
        {{ song.title }}
        <span class="playing-text" *ngIf="isCurrentSong && isPlaying">● Đang phát</span>
      </h3>
      <p class="song-artist">{{ song.artist }}</p>
    </div>

    <div class="song-actions">
      <ion-button fill="clear" size="small" class="action-btn" (click)="toggleLike($event)">
        <ion-icon [name]="isLiked ? 'heart' : 'heart-outline'"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="action-btn" (click)="showOptions($event)">
        <ion-icon name="ellipsis-horizontal"></ion-icon>
      </ion-button>
    </div>
  </div>

</div>
