
<ion-header>
  <ion-toolbar class="favorites-toolbar">
    <ion-title class="favorites-header">BÀI HÁT YÊU THÍCH</ion-title>
  </ion-toolbar>
</ion-header>

<!-- Bỏ (ionChange) - không cần thiết -->
<ion-content>
  <div class="favorites-container">

    <!-- Header với số lượng và nút phát ngẫu nhiên -->
    <div class="favorites-info-bar">
      <div class="count-badge">
        <ion-icon name="heart"></ion-icon>
        <span>{{ favoriteCount }} bài hát đã lưu</span>
      </div>

      <ion-button
        class="random-play-btn"
        (click)="playRandom()"
        [disabled]="favoriteCount === 0"
        fill="solid"
        shape="round">
        <ion-icon name="shuffle-outline" slot="start"></ion-icon>
        Phát ngẫu nhiên
      </ion-button>
    </div>

    <!-- Danh sách bài hát yêu thích -->
    <div *ngIf="favoriteCount > 0; else emptyState">

      <!-- DESKTOP: Grid 3 cột -->
      <div class="desktop-view" *ngIf="isDesktop">
        <div class="grid-3cols">
          <app-song-item
            *ngFor="let song of favoriteSongs"
            [song]="song"
          ></app-song-item>
        </div>
      </div>

      <!-- TABLET: Grid 2 cột -->
      <div class="tablet-view" *ngIf="isTablet">
        <div class="grid-2cols">
          <app-song-item
            *ngFor="let song of favoriteSongs"
            [song]="song"
          ></app-song-item>
        </div>
      </div>

      <!-- MOBILE: Grid 1 cột -->
      <div class="mobile-view" *ngIf="isMobile">
        <div class="grid-1col">
          <app-song-item
            *ngFor="let song of favoriteSongs"
            [song]="song"
          ></app-song-item>
        </div>
      </div>

    </div>

    <!-- Trạng thái rỗng -->
    <ng-template #emptyState>
      <div class="empty-state">
        <ion-icon name="heart-outline" class="empty-icon"></ion-icon>
        <h3>Chưa có bài hát yêu thích</h3>
        <p>Hãy thêm bài hát từ trang Thư viện bằng cách nhấn vào trái tim nhé!</p>
      </div>
    </ng-template>

  </div>
</ion-content>
