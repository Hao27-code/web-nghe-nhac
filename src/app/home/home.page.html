<ion-header>
  <app-header></app-header>
</ion-header>

<ion-content>
  <section class="home-section">
    <div class="greeting">
      {{greeting}}
    </div>

    <div class="playlist-row">
      @for (item of playlists; track item){
        <ion-card class="playlist-card">
          <img [src]="item.image">

            <!--lớp phủ-->
          <div class="overlay">
            <div class="type">
              {{item.type}}
            </div>
            <div class="name">
              {{item.name}}
            </div>
          </div>

        </ion-card>
      }
    </div>
  </section>
</ion-content>
