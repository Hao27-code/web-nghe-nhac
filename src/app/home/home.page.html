<ion-header>
<ion-toolbar>
  <app-header></app-header>
</ion-toolbar>
</ion-header>

<ion-content>
  <div class="home-content">
  <section class="home-section">
    <div class="greeting fade-down">
      {{greeting}}
    </div>

    <div class="custom-slider-container fade-down">
      <!-- Navigation Arrows -->
      <div class="nav-arrow prev-arrow" (click)="prevSlide()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </div>

      <div class="slider-viewport" #sliderViewport
           (mousedown)="onDragStart($event)"
           (touchstart)="onDragStart($event)">
        <div class="slider-track" #sliderTrack
             [style.transform]="'translateX(' + currentTranslate + 'px)'">
          <div class="slide" *ngFor="let slide of slides; let i = index">
            <div class="slide-item">
              <img [src]="isMobile ? (slide.mobileImage || slide.image) : slide.image">
            </div>
          </div>
        </div>
      </div>

      <div class="nav-arrow next-arrow" (click)="nextSlide()">
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </div>
    </div>

  </section>



  <div class="page-container">
    <section class="album-section">
      <ion-card class="album-card">
        <div class="img-wrapper">
          <img src="assets/img/album_banner.jpg" class="album-img">
        </div>
        <ion-card-content>
          <div class="album-text-banner">
            <p class="label">ALBUM NỔI BẬT</p>
            <h2 class="title">Midnight Echoes</h2>
            <p class="desc">
              Khám phá những giai điệu êm dịu cho đêm muộn. Thư giãn cùng các bản nhạc được tuyển chọn kỹ lưỡng.
            </p>
          </div>
          <div class="actions">
            <ion-button class="btn-play">
              <ion-icon slot="start" [icon]="icons.play"></ion-icon>
              Phát ngay
            </ion-button>
            <ion-button fill="outline" class="btn-more">
              <ion-icon slot="start" [icon]="icons.informationCircle"></ion-icon>
              Xem thêm
            </ion-button>
          </div>
        </ion-card-content>
      </ion-card>
    </section>
  </div>


  <div>
    <!-- Sử dụng component song-list -->
    <div class="section-header-list-song">
      <h2>Gợi ý bài hát</h2>

    </div>
    <app-song-list></app-song-list>

  </div>
  <!-- ==================== TIẾP TỤC NGHE ==================== -->
  <section class="music-section resume-section  reveal-on-scroll" *ngIf="recentlyPlayed.length > 0">
    <div class="section-header">
      <h2>Tiếp tục nghe</h2>

    </div>

    <div class="scroll-wrapper">
      <!-- Mũi tên trái -->
      <div class="scroll-arrow prev-arrow-scroll" (click)="scrollLeft('resumeScroll')">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </div>

      <!-- Phần cuộn ngang -->
      <div class="music-horizontal-scroll resume-scroll" #resumeScroll>
        <app-music-card
          *ngFor="let music of recentlyPlayed"
          [music]="music"
          (play)="onPlayMusic($event)">
        </app-music-card>
      </div>

      <!-- Mũi tên phải -->
        <div class="scroll-arrow next-arrow-scroll" (click)="scrollRight('resumeScroll')">
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </div>
    </div>
  </section>

  <!-- ==================== DÀNH CHO BẠN ==================== -->
  <div class="music-section  reveal-on-scroll">
    <div class="section-header">
      <h2>Dành cho bạn</h2>

    </div>

    <div class="scroll-wrapper">
      <!-- Mũi tên trái -->
      <div class="scroll-arrow prev-arrow-scroll" (click)="scrollLeft('forYouScroll')">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </div>

      <!-- Phần cuộn ngang -->
      <div class="music-horizontal-scroll" #forYouScroll>
        <app-music-card
          *ngFor="let music of musicList"
          [music]="music"
          (play)="onPlayMusic($event)">
        </app-music-card>
      </div>

      <!-- Mũi tên phải -->
      <div class="scroll-arrow next-arrow-scroll" (click)="scrollRight('forYouScroll')">
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </div>
    </div>
  </div>

  <app-playlist-slider
    class="reveal-on-scroll"
    [playlists]="homePlayliststop100"
    title="Top 100"
    categoryRoute="/category">
  </app-playlist-slider>

  <app-playlist-slider
    [playlists]="homePlaylists"
    title="Chill"
    categoryRoute="/category">
  </app-playlist-slider>
  </div>


</ion-content>
<app-player-bar></app-player-bar>
