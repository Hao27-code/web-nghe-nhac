<ion-app>

  <!-- Layout chính của ứng dụng -->
  <div class="app-container">

    <!-- Hiển thị header dựa trên thiết bị -->
    @if (isDesktop) {
      <app-desktop-header />
    } @else {
      <app-header />
    }

    <!-- Nội dung chính - CHỈ 1 router-outlet -->
    <div class="main-content" [class.has-sidebar]="isDesktop">
      <router-outlet />
    </div>

    <!-- Player bar hiển thị mọi nơi -->
    <app-player-bar />

  </div>

</ion-app>
