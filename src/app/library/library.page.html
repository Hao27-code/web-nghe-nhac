<ion-header>
  <ion-toolbar>
    <app-header></app-header>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">

  <div library-container>

    <!-- Skeleton Loading -->
    <app-skeleton-loader
      *ngIf="isLoading"
      [hasHeader]="true"
      [hasCover]="true"
      [hasTableHeader]="true"
      [hasAvatar]="true"
      [hasSubtitle]="true">
    </app-skeleton-loader>

    <!-- Nội dung thật -->
    <ng-container *ngIf="!isLoading">

      <div class="library-header">
        <div class="library-cover">
          <img src="assets/icon/logo_yeuthich.svg" alt="Playlist cover">
        </div>
        <div class="library-info">
          <h1 class="library-title">Thư viện bài hát</h1>
        </div>
      </div>

      <div class="table-library" *ngIf="!isMobile">
        <div class="col-song-library">BÀI HÁT</div>
        <div class="col-album-library">ALBUM</div>
      </div>

      <div class="table-header" *ngIf="!isMobile">
        <div class="col-song">BÀI HÁT</div>
        <div class="col-album">ALBUM</div>
        <div class="col-time">THỜI GIAN</div>
      </div>

      <div class="songs-list">
        <app-library-song-item
          *ngFor="let song of allSongs; trackBy: trackById"
          [song]="song">
        </app-library-song-item>
      </div>

    </ng-container>

  </div>

</ion-content>
<app-player-bar></app-player-bar>
