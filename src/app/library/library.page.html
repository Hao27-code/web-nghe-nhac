<!-- library.page.html -->
<ion-header>
  <ion-toolbar class="library-toolbar">
    <ion-title class="library-header">THƯ VIỆN</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="library-container">

    <!-- DESKTOP: Grid 4 cột -->
    <div class="desktop-view" *ngIf="isDesktop">
      <div class="grid-4cols">
        <app-song-item
          *ngFor="let song of allSongs"
          [song]="song"
        ></app-song-item>
      </div>
    </div>

    <!-- TABLET: Grid 3 cột -->
    <div class="tablet-view" *ngIf="isTablet">
      <div class="grid-3cols">
        <app-song-item
          *ngFor="let song of allSongs"
          [song]="song"
        ></app-song-item>
      </div>
    </div>

    <!-- MOBILE: Grid 1 cột (cuộn dọc) -->
    <div class="mobile-view" *ngIf="isMobile">
      <div class="grid-1col">
        <app-song-item
          *ngFor="let song of allSongs"
          [song]="song"
        ></app-song-item>
      </div>
    </div>

  </div>
</ion-content>
<app-player-bar></app-player-bar>
