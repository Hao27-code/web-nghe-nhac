<ion-header>
  <ion-toolbar>
    <app-header></app-header>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">

  <!-- Tiêu đề trong content -->
  <!-- ========== HEADER PLAYLIST ========== -->
  <div class="library-header">
    <!-- Ảnh playlist -->
    <div class="library-cover">
      <img src="assets/icon/logo_yeuthich.svg" alt="Playlist cover">
    </div>

    <!-- Thông tin playlist -->
    <div class="library-info">

      <h1 class="library-title">Thư viện bài hát</h1>
    </div>
  </div>

  <div class="table-library" *ngIf="!isMobile">
    <div class="col-song-library">BÀI HÁT</div>
    <div class="col-album-library">ALBUM</div>
  </div>

  <!-- Header bảng (chỉ hiển thị trên desktop/tablet) -->
  <div class="table-header" *ngIf="!isMobile">
    <div class="col-song">BÀI HÁT</div>
    <div class="col-album">ALBUM</div>
    <div class="col-time">THỜI GIAN</div>
  </div>

  <!-- Danh sách bài hát -->
  <div class="songs-list">
    <app-library-song-item
      *ngFor="let song of favoriteSongs"
      [song]="song">
    </app-library-song-item>
  </div>

  <!-- Trống -->
  <ng-template #emptyState>
    <div class="empty-state">
      <ion-icon name="heart-outline"></ion-icon>
      <h3>Thư viện trống</h3>
      <p>Hãy bấm tim ❤️ để thêm bài hát vào thư viện</p>
    </div>
  </ng-template>

</ion-content>
